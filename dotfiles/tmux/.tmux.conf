# PeachOS — tmux config
# Paleta: cream=#FFF8F5 peach=#E8956D lavender=#C4A8D4 blossom=#E8A0B8 deep_plum=#2D2433 muted_plum=#6B5B7A
# Dependência de runtime: wl-clipboard (pacman -S wl-clipboard) para copy-pipe funcionar no Wayland

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Tc"
set -g default-shell "/bin/zsh"

# --- Comportamento geral ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g focus-events on          # repassa FocusIn/Out para nvim etc.
setw -g aggressive-resize on

# --- Prefixo: Ctrl+a (mais ergonômico que Ctrl+b) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "󰑓  Config recarregado"

# --- Divisão de painéis (mantém diretório atual) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Navegação estilo Vim entre painéis ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Redimensionar painéis ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode estilo Vim ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send-keys -X cancel

# ── Cores ───────────────────────────────────────────────────────────────────

# Status bar
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#2D2433,fg=#FFF8F5"

# Esquerda: nome da sessão
set -g status-left-length 30
set -g status-left "#[bg=#E8956D,fg=#FFF8F5,bold] #{?client_prefix,⬡ ,  }#S #[bg=#2D2433,fg=#E8956D,nobold]"

# Direita: hora e data
set -g status-right-length 50
set -g status-right "#[fg=#6B5B7A]#[bg=#6B5B7A,fg=#FFF8F5]  %H:%M #[bg=#C4A8D4,fg=#2D2433,bold]  %d/%m/%Y "

# Janelas inativas
setw -g window-status-style "bg=#2D2433,fg=#6B5B7A"
setw -g window-status-format " #I  #W "

# Janela ativa
setw -g window-status-current-style "bg=#E8A0B8,fg=#2D2433,bold"
setw -g window-status-current-format " #I  #W "

# Bordas de painel
set -g pane-border-style "fg=#6B5B7A"
set -g pane-active-border-style "fg=#E8956D"

# Mensagens
set -g message-style "bg=#E8956D,fg=#FFF8F5,bold"
set -g message-command-style "bg=#C4A8D4,fg=#2D2433"

# Mode (copy, etc.)
setw -g mode-style "bg=#C4A8D4,fg=#2D2433"
