# GDM — PeachOS
# Configuração dconf para a tela de login.
# Instalado por apply-theme-system.sh em /etc/dconf/db/gdm.d/00-peachos.conf.
# Cores derivadas de themes/palette.json.
#
# Para ativar: apply-theme-system.sh copia este arquivo e roda dconf update.

[org/gnome/desktop/background]
primary-color='#2D2433'
color-shading-type='solid'
picture-options='none'
picture-uri=''
picture-uri-dark=''

[org/gnome/desktop/screensaver]
primary-color='#2D2433'
color-shading-type='solid'
picture-options='none'
picture-uri=''

[org/gnome/login-screen]
logo=''
banner-message-enable=false
disable-restart-buttons=false
