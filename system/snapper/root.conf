## Snapper config para subvolume root (/)
SUBVOLUME="/"
FSTYPE="btrfs"

ALLOW_USERS=""
ALLOW_GROUPS=""

TIMELINE_CREATE="yes"
TIMELINE_CLEANUP="yes"

# Retenção de snapshots por timeline
TIMELINE_MIN_AGE="1800"
TIMELINE_LIMIT_HOURLY="5"
TIMELINE_LIMIT_DAILY="7"
TIMELINE_LIMIT_WEEKLY="0"
TIMELINE_LIMIT_MONTHLY="0"
TIMELINE_LIMIT_YEARLY="0"

# Snapshots via pacman (snap-pac)
BACKGROUND_COMPARISON="yes"
NUMBER_CLEANUP="yes"
NUMBER_MIN_AGE="1800"
NUMBER_LIMIT="50"
NUMBER_LIMIT_IMPORTANT="10"
