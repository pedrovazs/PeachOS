# /etc/aide.conf — PeachOS
# AIDE: monitoramento de integridade de arquivos críticos

# Localização do banco de dados
database_in=file:/var/lib/aide/aide.db.gz
database_out=file:/var/lib/aide/aide.db.new.gz
database_new=file:/var/lib/aide/aide.db.new.gz
gzip_dbout=yes

# Grupos de verificação
PERMS = p+u+g+acl+selinux+xattrs
CONTENT = sha256+rmd160+tiger
CONTENT_EX = sha256+rmd160+tiger+size+s+b+m+c+xattrs

# Diretórios monitorados
/boot  CONTENT_EX
/etc   CONTENT_EX
/usr/bin CONTENT_EX
/usr/sbin CONTENT_EX
/usr/lib CONTENT_EX

# Ignorar arquivos que mudam normalmente
!/etc/pacman.d/mirrorlist
!/etc/adjtime
!/etc/mtab
!/etc/resolv.conf
!/var/lib/aide
